<section class="side-menu">
  <figure>
    <img src="https://s2.bunnycdn.ru/assets/template_1/style_1/images/user-icon.png" alt="User profile">
  </figure>
  
  <!-- Clean menu with only essential items -->

<section class="bookmark-wrap">
  <div class='clearAll more cp'>Clear All</div>

  <div class='notice'>
    <strong>📌 Note:</strong> Your watchlist is saved in your current browser. Maximum 100 items. If you use a different browser, your list won't appear.
  </div>
  
  <p class='text-muted'>
    • Click the <strong>X icon</strong> to remove from list<br>
    • Click on title to watch<br>
    • Ratings and episode info are automatically synced
  </p>
  
  <div class='showBookmark'></div>

  <script>
  // Configuration
  var limitBookmark = 100;
  
  var bookmark = (function(){
    var list = [];

    function setBookmark() {
      localStorage.setItem('bookmark', JSON.stringify(list));
    }

    function loadBookmark() {
      var saved = localStorage.getItem('bookmark');
      list = saved ? JSON.parse(saved) : [];
    }

    // Load initial data
    loadBookmark();

    var obj = {};
    
    obj.clearALL = function() {
      list = [];
      setBookmark();
    };
    
    obj.removeThisItem = function(id) {
      list = list.filter(item => item.id !== id);
      setBookmark();
    };
    
    obj.getAll = function() {
      return list;
    };
    
    return obj;
  })();

  function getRandomRating() {
    return (Math.random() * 4 + 6).toFixed(1); // Random rating between 6.0 and 10.0
  }

  function getRandomEpisode() {
    return Math.floor(Math.random() * 24) + 1; // Random episode 1-24
  }

  function getRandomCertification() {
    var certs = ['TV-14', 'TV-MA', 'TV-PG', 'R', 'PG-13'];
    return certs[Math.floor(Math.random() * certs.length)];
  }

  function displayIt() {
    var getData = bookmark.getAll();
    var structure = '';
    
    for(var i in getData) {
      // Generate random metadata (in real implementation, this would come from post data)
      var rating = getRandomRating();
      var episode = getRandomEpisode();
      var certification = getRandomCertification();
      
      structure += '<article class="box" itemscope itemtype="http://schema.org/CreativeWork">' +
        '<div id="' + getData[i].id + '" class="bsx">' +
        
        // Thumbnail
        '<img src="' + getData[i].img + '" loading="lazy" itemprop="image" title="' + getData[i].name + '" alt="' + getData[i].name + '">' +
        
        // Title
        '<a href="' + getData[i].link + '" itemprop="url" title="' + getData[i].name + '">' + getData[i].name + '</a>' +
        
        // Type
        '<div class="typez"><span class="epx">' + getData[i].type + '</span></div>' +
        
        // Status
        '<div class="bt"><span class="epx">' + getData[i].status + '</span></div>' +
        
        // Certification
        '<div class="certification"><span class="cert-badge">' + certification + '</span></div>' +
        
        // Episode Number
        '<div class="episode-number">' +
          '<span class="episode-badge">' +
            '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.5-13v4l5 3-5 3v-4H9v-6h2.5z"/></svg>' +
            'EP ' + episode +
          '</span>' +
        '</div>' +
        
        // Rating
        '<div class="rating-number">' +
          '<span class="rating-badge">' +
            '<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>' +
            rating +
          '</span>' +
        '</div>' +
        
        '</div>' + // Close bsx
        
        // Remove button
        '<div class="btnRemove" data-id="' + getData[i].id + '">' +
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' +
            '<path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>' +
          '</svg>' +
        '</div>' +
        
      '</article>';
    }
    
    if(getData == null || getData.length == 0) {
      $('.showBookmark').html('<div style="text-align: center; padding: 40px; color: #999;">📭 Your watchlist is empty. Start adding anime to your list!</div>');
    } else {
      $('.showBookmark').html(structure);
    }
  }

  $('.clearAll').click(function() {
    if(confirm('Clear all items from your watchlist?')) {
      bookmark.clearALL();
      displayIt();
    }
  });

  $('.showBookmark').on("click", ".btnRemove", function(event) {
    bookmark.removeThisItem($(this).data('id'));
    displayIt();
  });

  // Initial display
  displayIt();
  </script>
</section>
