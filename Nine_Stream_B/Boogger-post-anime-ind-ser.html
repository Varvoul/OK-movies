<script>
  // Function to handle arrow clicks and visibility
  function setupCastScrolling() {
    const container = document.querySelector('.cast-scroll-container');
    const leftArrow = document.querySelector('.left-arrow');
    const rightArrow = document.querySelector('.right-arrow');
    
    if (!container || !leftArrow || !rightArrow) return;
    
    const scrollAmount = 300;
    
    leftArrow.addEventListener('click', function() {
      container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
    });
    
    rightArrow.addEventListener('click', function() {
      container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
    });
    
    function updateArrows() {
      const isAtStart = container.scrollLeft <= 5;
      const isAtEnd = container.scrollLeft + container.clientWidth >= container.scrollWidth - 5;
      leftArrow.classList.toggle('hidden', isAtStart);
      rightArrow.classList.toggle('hidden', isAtEnd);
    }
    
    setTimeout(updateArrows, 100);
    container.addEventListener('scroll', updateArrows);
    window.addEventListener('resize', updateArrows);
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupCastScrolling);
  } else {
    setupCastScrolling();
  }
  
  window.updateArrowVisibility = function(container) {
    const leftArrow = document.querySelector('.left-arrow');
    const rightArrow = document.querySelector('.right-arrow');
    if (!leftArrow || !rightArrow) return;
    const isAtStart = container.scrollLeft <= 5;
    const isAtEnd = container.scrollLeft + container.clientWidth >= container.scrollWidth - 5;
    leftArrow.classList.toggle('hidden', isAtStart);
    rightArrow.classList.toggle('hidden', isAtEnd);
  };
  
  (function() {

    const episodeTitles = [

    ];

    // ============================================

    // SUB HD-01 (Independent)
    const subEpisodesHD01 = [
      'https://bysejikuar.com/e/hw93auhkvob6/dead-account-sub-01',
      'https://bysejikuar.com/e/ikc04iib4myf/watch-dead-account-anime-sub-ep-02',

      'https://bysejikuar.com/e/sjwbyhuj8c4d/dead-account-anime-english-sub-ep-06',

      'https://bysejikuar.com/e/19yq255uz24n/dead-account-anime-english-sub-ep-08',
      'https://bysejikuar.com/e/2m4f0qm7b41h/dead-account-anime-english-sub-ep-09',
      'https://bysejikuar.com/e/jm1hi7zcdvwp/dead-account-anime-english-sub-ep10',
      'https://bysejikuar.com/e/l9ycfdmefnog/dead-account-anime-english-sub-ep-11'
    ];
    
    // SUB HD-02 (Independent)
    const subEpisodesHD02 = [
      'https://mixdrop.top/e/q19k7xzmi4ozrr',
      'https://mixdrop.top/e/dkdgxopdb7jej1q',
      'https://mixdrop.top/e/jdzov01eb3d8oz',

      'https://mixdrop.top/e/8lqz96wghvzmjz',
      'https://mixdrop.top/e/6791wvnkbgzk3o',
      'https://mixdrop.top/e/jdzovnwwa7ozr1j',
      'https://mixdrop.top/e/363logwpidn03d'
    ];
    
    // SUB HD-03 (Independent - currently empty, add links later)
    const subEpisodesHD03 = [
      '', '', '', '', '', '', '', '', '', '', ''
    ];
    
    // SUB HD-04 (Independent - add your HD-04 links here later)
    const subEpisodesHD04 = [

    ];

    // ============================================
    // DUB SERVER LINKS (HD-01 to HD-04)
    // Each HD has its own independent links

    // DUB HD-01 (Independent)
    const dubEpisodesHD01 = [
      'https://bysejikuar.com/e/b6sb2ri9956k/watch-dead-account-anime-english-dub-ep-03',
      'https://bysejikuar.com/e/fm75d41y8whj/watch-dead-account-anime-english-dub-ep-04',
      'https://bysejikuar.com/e/rn7iwtidw46i/dead-account-anime-english-dub-05',
      'https://bysejikuar.com/e/17dy6jy4z6g7/dead-account-anime-english-dub-06',
      'https://bysejikuar.com/e/lwvd4p4erg59/dead-account-anime-english-dub-07',
      'https://bysejikuar.com/e/zukjg4ymgaf9/dead-account-anime-english-dub-08',
      'https://bysejikuar.com/e/5tgvpnaykywb/dead-account-anime-english-dub-09'
    ];
    
    // DUB HD-02 (Independent)
    const dubEpisodesHD02 = [
      'https://mixdrop.top/e/el038rppinvelx',
      'https://mixdrop.top/e/dkdgop9vtp84xk',
      'https://mixdrop.top/e/vkzx143wbnve83',
      'https://mixdrop.top/e/ow90dmmrhkzvkd',
      'https://mixdrop.top/e/l7qpv1djf30n77',
      'https://mixdrop.top/e/jdzovww1b7p7lrv',
      'https://mixdrop.top/e/r69lv8onuv4og8d'
    ];
    
    // DUB HD-03 (Independent - currently empty, add links later)
    const dubEpisodesHD03 = [
      '', '', '', '', '', '', ''
    ];
    
    // DUB HD-04 (Independent - add your HD-04 links here later)
    const dubEpisodesHD04 = [
      '', '', '', '', '', '', ''
    ];

    // ============================================
    // RAW SERVER LINKS (Mirror SUB links)
    // ============================================
    const rawEpisodesHD01 = [...subEpisodesHD01];
    const rawEpisodesHD02 = [...subEpisodesHD02];
    const rawEpisodesHD03 = [...subEpisodesHD03];
    const rawEpisodesHD04 = [...subEpisodesHD04];

    // ============================================
    // EPISODE URL MAPPING
    // Each server points to its independent array
    // ============================================
    const episodeUrls = {
      'SUB-HD-01': subEpisodesHD01,
      'SUB-HD-02': subEpisodesHD02,
      'SUB-HD-03': subEpisodesHD03,
      'SUB-HD-04': subEpisodesHD04,
      'DUB-HD-01': dubEpisodesHD01,
      'DUB-HD-02': dubEpisodesHD02,
      'DUB-HD-03': dubEpisodesHD03,
      'DUB-HD-04': dubEpisodesHD04,
      'RAW-HD-01': rawEpisodesHD01,
      'RAW-HD-02': rawEpisodesHD02,
      'RAW-HD-03': rawEpisodesHD03,
      'RAW-HD-04': rawEpisodesHD04
    };

    // Episode data for seasons
    const episodeData = {
      '1': episodeTitles.map((title, idx) => ({ id: idx+1, title })),
      '2': Array(6).fill().map((_, i) => ({ id: i+1, title: `Season 2 Episode ${i+1}` })),
      '3': Array(4).fill().map((_, i) => ({ id: i+1, title: `Season 3 Episode ${i+1}` })),
      '4': Array(3).fill().map((_, i) => ({ id: i+1, title: `Season 4 Episode ${i+1}` })),
      'ova': Array(3).fill().map((_, i) => ({ id: i+1, title: `OVA Episode ${i+1}` }))
    };

    // State
    let currentSeason = '1';
    let currentEpisode = 1;
    let currentServer = 'SUB-HD-01';

    // DOM elements
    const container = document.getElementById('video-player-container-main');
    const overlay = document.getElementById('video-loading-overlay-main');
    const displaySeason = document.getElementById('display-season');
    const displayEpisode = document.getElementById('display-episode');
    const displayServer = document.getElementById('display-server');
    const episodesContainer = document.getElementById('episodes-container');
    const seasonBtns = document.querySelectorAll('.season-btn');
    const serverBtns = document.querySelectorAll('.server-btn');
    const prevBtn = document.getElementById('prev-episode-btn');
    const nextBtn = document.getElementById('next-episode-btn');
    const addToListBtn = document.getElementById('add-to-list-btn');

    function updateInfoDisplay() {
      if (displaySeason) displaySeason.innerText = currentSeason;
      if (displayEpisode) displayEpisode.innerText = currentEpisode;
      if (displayServer) displayServer.innerText = currentServer;
    }

    function clearServerActive() {
      serverBtns.forEach(btn => btn.classList.remove('active-server'));
    }

    function clearSeasonActive() {
      seasonBtns.forEach(btn => btn.classList.remove('active-season'));
    }

    function loadVideo() {
      if (!container) return;
      const episodes = episodeData[currentSeason] || [];
      if (currentEpisode > episodes.length) currentEpisode = 1;

      const episodeIndex = currentEpisode - 1;
      let videoUrl = '';
      const serverUrls = episodeUrls[currentServer];
      
      if (serverUrls && episodeIndex < serverUrls.length && serverUrls[episodeIndex]) {
        videoUrl = serverUrls[episodeIndex];
      }

      if (!videoUrl) {
        container.innerHTML = '<div class="video-container" style="display: flex; align-items: center; justify-content: center; color: white; background: #000;">No video available for this episode on this server. Try another server.</div>';
        if (overlay) overlay.style.display = 'none';
        return;
      }

      let embedUrl = videoUrl;
      if (videoUrl.includes('strmup.to')) {
        embedUrl = videoUrl + (videoUrl.includes('?') ? '&' : '?') + 'autoplay=1&controls=1&modestbranding=1&rel=0';
      } else {
        embedUrl = videoUrl + (videoUrl.includes('?') ? '&' : '?') + 'autoplay=1';
      }

      container.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.className = 'video-container';
      iframe.src = embedUrl;
      iframe.frameBorder = '0';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.title = `S${currentSeason} E${currentEpisode}`;
      container.appendChild(iframe);

      if (overlay) overlay.style.display = 'none';
    }

    function renderEpisodes() {
      const episodes = episodeData[currentSeason] || [];
      let html = '';
      episodes.forEach(ep => {
        const activeClass = (ep.id === currentEpisode) ? 'active' : '';
        const epNumber = ep.id.toString().padStart(2, '0');
        html += `<div class="episode-list-item ${activeClass}" data-episode-id="${ep.id}">EP ${epNumber}: ${ep.title}</div>`;
      });
      episodesContainer.innerHTML = html;

      document.querySelectorAll('.episode-list-item').forEach(el => {
        el.addEventListener('click', function(e) {
          const epId = parseInt(this.dataset.episodeId);
          if (!isNaN(epId)) {
            currentEpisode = epId;
            document.querySelectorAll('.episode-list-item').forEach(item => item.classList.remove('active'));
            this.classList.add('active');
            updateInfoDisplay();
            if (currentServer) loadVideo();
          }
        });
      });
    }

    function init() {
      clearSeasonActive();
      seasonBtns.forEach(btn => {
        if (btn.dataset.season === currentSeason) {
          btn.classList.add('active-season');
        }
      });

      clearServerActive();
      serverBtns.forEach(btn => {
        if (btn.dataset.server === currentServer) {
          btn.classList.add('active-server');
        }
      });

      renderEpisodes();
      updateInfoDisplay();
      if (currentServer) loadVideo();
    }

    // Event listeners
    seasonBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        const season = this.dataset.season;
        if (!season) return;
        currentSeason = season;
        currentEpisode = 1;
        clearSeasonActive();
        this.classList.add('active-season');
        renderEpisodes();
        updateInfoDisplay();
        if (currentServer) loadVideo();
      });
    });

    serverBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        const server = this.dataset.server;
        if (!server) return;
        currentServer = server;
        clearServerActive();
        this.classList.add('active-server');
        updateInfoDisplay();
        loadVideo();
      });
    });

    if (prevBtn) {
      prevBtn.addEventListener('click', function() {
        const episodes = episodeData[currentSeason] || [];
        const currentIndex = episodes.findIndex(ep => ep.id === currentEpisode);
        if (currentIndex > 0) {
          currentEpisode = episodes[currentIndex - 1].id;
          renderEpisodes();
          updateInfoDisplay();
          if (currentServer) loadVideo();
        }
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener('click', function() {
        const episodes = episodeData[currentSeason] || [];
        const currentIndex = episodes.findIndex(ep => ep.id === currentEpisode);
        if (currentIndex < episodes.length - 1) {
          currentEpisode = episodes[currentIndex + 1].id;
          renderEpisodes();
          updateInfoDisplay();
          if (currentServer) loadVideo();
        }
      });
    }

    if (addToListBtn) {
      const storageKey = 'quravel_list_status';
      const savedStatus = localStorage.getItem(storageKey);
      if (savedStatus === 'in_list') {
        addToListBtn.innerHTML = '✓ In List';
        addToListBtn.style.background = '#498BBB';
        addToListBtn.style.color = 'white';
        addToListBtn.style.borderColor = '#498BBB';
      }

      addToListBtn.addEventListener('click', function() {
        if (this.innerText.includes('Add')) {
          this.innerHTML = '✓ In List';
          this.style.background = '#498BBB';
          this.style.color = 'white';
          this.style.borderColor = '#498BBB';
          localStorage.setItem(storageKey, 'in_list');
        } else {
          this.innerHTML = '+ Add to List';
          this.style.background = '#141a25';
          this.style.color = '#e5e7eb';
          this.style.borderColor = '#498BBB';
          localStorage.removeItem(storageKey);
        }
      });
    }

    if (overlay) {
      overlay.addEventListener('click', function() {
        if (currentServer) loadVideo();
      });
    }

    init();
  })();
  
  document.addEventListener('DOMContentLoaded', function() {
    const synopsis = document.getElementById('synopsis');
    if (synopsis) {
      synopsis.addEventListener('click', function(e) {
        e.stopPropagation();
        this.classList.toggle('expanded');
      });
    }
  });
</script>
