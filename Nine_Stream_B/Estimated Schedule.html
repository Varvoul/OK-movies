<style>
  /* Main Container */
  .schedule-countdown-container {
    background: #1e2235;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 30px;
    font-family: 'Inter', sans-serif;
    position: relative;
  }
  
  /* World Timer - Top Right */
  .world-timer {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #2a2f45;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 0.85rem;
    color: #e5e7eb;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid #3a4055;
    z-index: 5;
  }
  
  .world-timer svg {
    width: 16px;
    height: 16px;
    fill: #bb3a67;
  }
  
  .timer-display {
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  
  /* On The Horizon Text */
  .horizon-text {
    font-size: 1.2rem;
    font-weight: 600;
    color: white;
    margin-bottom: 20px;
    padding-right: 200px; /* Make space for timer */
  }
  
  /* Horizontal Scroll Container */
  .days-scroll-container {
    position: relative;
    margin-bottom: 25px;
  }
  
  .days-scroll {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    gap: 12px;
    padding: 5px 0 15px 0;
    -ms-overflow-style: none;  /* Hide scrollbar IE/Edge */
    scrollbar-width: none;  /* Hide scrollbar Firefox */
  }
  
  .days-scroll::-webkit-scrollbar {
    display: none;  /* Hide scrollbar Chrome/Safari */
  }
  
  /* Day Card */
  .day-card {
    flex: 0 0 auto;
    width: 85px;
    background: #b32456;  /* Primary card color */
    border-radius: 12px;
    padding: 12px 5px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }
  
  .day-card:hover {
    transform: translateY(-3px);
    background: #bb3a67 !important;  /* Secondary color on hover */
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }
  
  .day-card.active {
    background: #8f1d45 !important;  /* Dark color for active */
    transform: scale(1.02);
  }
  
  .day-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: white;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .date-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.9);
  }
  
  .month-name {
    font-weight: 500;
  }
  
  .day-number {
    font-weight: 600;
    font-size: 1rem;
  }
  
  /* Navigation Arrows */
  .scroll-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    background: #2a2f45;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    border: 1px solid #3a4055;
    transition: all 0.2s;
    opacity: 0.8;
  }
  
  .scroll-arrow:hover {
    background: #bb3a67;
    opacity: 1;
    transform: translateY(-50%) scale(1.1);
  }
  
  .scroll-arrow.hidden {
    opacity: 0.3;
    pointer-events: none;
    cursor: default;
  }
  
  .scroll-arrow.left-arrow {
    left: -15px;
  }
  
  .scroll-arrow.right-arrow {
    right: -15px;
  }
  
  .scroll-arrow svg {
    width: 20px;
    height: 20px;
    fill: white;
  }
  
  /* Shows List Container */
  .shows-list-container {
    background: #2a2f45;
    border-radius: 12px;
    padding: 15px;
    margin-top: 10px;
  }
  
  .shows-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  
  /* Show Item Row */
  .show-item {
    display: flex;
    align-items: center;
    padding: 12px 15px;
    background: #1e2235;
    border-radius: 8px;
    transition: all 0.2s;
    border-left: 4px solid transparent;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  
  .show-item:hover {
    background: #8f1d45;
    border-left-color: #f39c12;
    transform: translateX(5px);
  }
  
  .show-time {
    min-width: 90px;
    font-weight: 600;
    color: #f39c12;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  
  .show-time svg {
    width: 16px;
    height: 16px;
    fill: #f39c12;
  }
  
  .show-title {
    flex: 1;
    font-weight: 500;
    color: white;
    font-size: 0.95rem;
    padding: 0 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .show-episode {
    min-width: 100px;
    color: #9ca3af;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  
  .show-episode svg {
    width: 14px;
    height: 14px;
    fill: #9ca3af;
  }
  
  .show-status {
    min-width: 80px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-align: center;
    text-transform: uppercase;
  }
  
  .status-airing {
    background: #10b981;
    color: white;
  }
  
  .status-upcoming {
    background: #f59e0b;
    color: white;
  }
  
  .status-ongoing {
    background: #3b82f6;
    color: white;
  }
  
  /* Show More Button */
  .show-more-btn {
    background: #2a2f45;
    color: white;
    border: 1px solid #3a4055;
    padding: 12px 25px;
    border-radius: 30px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  
  .show-more-btn:hover {
    background: #bb3a67;
    border-color: #bb3a67;
    transform: translateY(-2px);
  }
  
  .show-more-btn svg {
    width: 18px;
    height: 18px;
    fill: white;
    transition: transform 0.3s;
  }
  
  .show-more-btn.expanded svg {
    transform: rotate(180deg);
  }
  
  .hidden-shows {
    display: none;
  }
  
  .hidden-shows.expanded {
    display: block;
  }
  
  /* Loading State */
  .schedule-loading {
    text-align: center;
    padding: 40px;
    color: #9ca3af;
  }
  
  .schedule-loading svg {
    width: 40px;
    height: 40px;
    fill: #bb3a67;
    animation: spin 1s linear infinite;
  }
  
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  
  /* No Shows Message */
  .no-shows {
    text-align: center;
    padding: 40px;
    color: #9ca3af;
    font-style: italic;
  }
  
  /* Mobile Responsive */
  @media (max-width: 768px) {
    .world-timer {
      position: static;
      margin-bottom: 15px;
      width: fit-content;
    }
    
    .horizon-text {
      padding-right: 0;
      font-size: 1.1rem;
    }
    
    .scroll-arrow {
      display: none !important;
    }
    
    .day-card {
      width: 70px;
      padding: 10px 3px;
    }
    
    .day-name {
      font-size: 0.9rem;
    }
    
    .show-item {
      flex-wrap: wrap;
      padding: 12px 10px;
    }
    
    .show-time {
      min-width: 70px;
      font-size: 0.9rem;
    }
    
    .show-title {
      width: 100%;
      order: 2;
      padding: 8px 0 0 0;
      white-space: normal;
    }
    
    .show-episode {
      min-width: auto;
      margin-left: auto;
    }
    
    .show-status {
      min-width: 60px;
      font-size: 0.7rem;
      padding: 3px 6px;
    }
    
    .show-more-btn {
      width: 100%;
      justify-content: center;
    }
  }
  
  @media (max-width: 480px) {
    .show-item {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    
    .show-time {
      width: 100%;
    }
    
    .show-episode {
      margin-left: 0;
    }
    
    .show-status {
      align-self: flex-start;
    }
  }
</style>

<script>
//<![CDATA[
(function() {
  // Configuration
  const SCHEDULE_CONFIG = {
    maxShowsDefault: 10,
    weekStartDay: 5, // Friday (0 = Sunday, 1 = Monday, etc.)
    validTypes: ['TV', 'Series', 'Drama', 'Anime'],
    validStatuses: ['Ongoing', 'Airing', 'Upcoming']
  };
  
  let currentShows = [];
  let filteredShows = [];
  let currentPage = 1;
  let showsPerPage = SCHEDULE_CONFIG.maxShowsDefault;
  let expanded = false;
  let selectedDay = null;
  
  // Initialize world timer
  function initWorldTimer() {
    updateWorldTimer();
    setInterval(updateWorldTimer, 1000);
  }
  
  function updateWorldTimer() {
    const timerDisplay = document.getElementById('timerDisplay');
    if (!timerDisplay) return;
    
    const now = new Date();
    
    // Get timezone offset
    const offset = -now.getTimezoneOffset();
    const offsetHours = Math.floor(Math.abs(offset) / 60);
    const offsetMins = Math.abs(offset) % 60;
    const offsetSign = offset >= 0 ? '+' : '-';
    const offsetStr = `GMT${offsetSign}${offsetHours.toString().padStart(2, '0')}:${offsetMins.toString().padStart(2, '0')}`;
    
    // Format date
    const dateStr = now.toLocaleDateString('en-US', {
      month: 'numeric',
      day: 'numeric',
      year: 'numeric'
    });
    
    // Format time
    let hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const seconds = now.getSeconds().toString().padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12; // 0 should be 12
    
    timerDisplay.textContent = `(${offsetStr}) ${dateStr} ${hours}:${minutes}:${seconds} ${ampm}`;
  }
  
  // Generate next 14 days (current week + next week)
  function generateDayCards() {
    const daysScroll = document.getElementById('daysScroll');
    if (!daysScroll) return;
    
    const today = new Date();
    const currentDay = today.getDay(); // 0-6
    
    // Find the most recent Friday
    let daysToAdd = (currentDay - SCHEDULE_CONFIG.weekStartDay + 7) % 7;
    let startDate = new Date(today);
    startDate.setDate(today.getDate() - daysToAdd);
    
    let html = '';
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    
    // Generate 14 days (current week + next week)
    for (let i = 0; i < 14; i++) {
      const date = new Date(startDate);
      date.setDate(startDate.getDate() + i);
      
      const dayName = dayNames[date.getDay()];
      const monthName = monthNames[date.getMonth()];
      const dayNumber = date.getDate();
      const isToday = date.toDateString() === today.toDateString();
      
      html += `
        <div class="day-card ${isToday ? 'active' : ''}" data-date="${date.toISOString().split('T')[0]}" data-day="${date.getDay()}" data-month="${date.getMonth()}" data-daynum="${dayNumber}">
          <div class="day-name">${dayName}</div>
          <div class="date-container">
            <span class="month-name">${monthName}</span>
            <span class="day-number">${dayNumber}</span>
          </div>
        </div>
      `;
      
      if (isToday) {
        selectedDay = date.toISOString().split('T')[0];
      }
    }
    
    daysScroll.innerHTML = html;
    
    // Add click handlers to day cards
    document.querySelectorAll('.day-card').forEach(card => {
      card.addEventListener('click', function() {
        document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        selectedDay = this.dataset.date;
        filterShowsByDay(selectedDay);
      });
    });
  }
  
  // Fetch shows from Blogger feed
  function fetchShows() {
    const script = document.createElement('script');
    script.src = '/feeds/posts/default?alt=json-in-script&max-results=50&orderby=published&callback=handleScheduleResponse';
    script.onerror = () => {
      document.getElementById('showsList').innerHTML = '<div class="no-shows">Failed to load schedule</div>';
    };
    document.head.appendChild(script);
  }
  
  // Handle Blogger response
  window.handleScheduleResponse = function(data) {
    if (data.feed.entry && data.feed.entry.length > 0) {
      parseShowsFromFeed(data.feed.entry);
    } else {
      document.getElementById('showsList').innerHTML = '<div class="no-shows">No shows found</div>';
    }
  };
  
  // Parse shows from feed
  function parseShowsFromFeed(entries) {
    currentShows = [];
    
    entries.forEach(entry => {
      const title = entry.title.$t;
      const link = entry.link.find(l => l.rel === 'alternate').href;
      const content = entry.content ? entry.content.$t : '';
      
      // Extract type from labels
      const labels = entry.category ? entry.category.map(c => c.term) : [];
      
      // Check if show is valid (TV, Series, Drama, Anime)
      const isValidType = labels.some(label => 
        SCHEDULE_CONFIG.validTypes.includes(label)
      );
      
      // Check status
      const status = labels.find(label => 
        SCHEDULE_CONFIG.validStatuses.includes(label)
      ) || 'Airing';
      
      // Generate random time for demo (in production, extract from post)
      const hour = Math.floor(Math.random() * 12) + 18; // 18-23
      const minute = Math.floor(Math.random() * 4) * 15; // 0,15,30,45
      const timeStr = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
      
      // Generate random episode
      const episode = Math.floor(Math.random() * 12) + 1;
      
      // Generate random date within next 14 days
      const date = new Date();
      date.setDate(date.getDate() + Math.floor(Math.random() * 14));
      const dateStr = date.toISOString().split('T')[0];
      
      // Extract thumbnail
      let thumbnail = '';
      if (entry.media$thumbnail) {
        thumbnail = entry.media$thumbnail.url.replace(/\/s[0-9]+(-c)?/, '/s100');
      }
      
      currentShows.push({
        id: entry.id.$t,
        title: title,
        link: link,
        type: labels.find(l => SCHEDULE_CONFIG.validTypes.includes(l)) || 'Anime',
        status: status,
        time: timeStr,
        episode: episode,
        date: dateStr,
        thumbnail: thumbnail,
        labels: labels
      });
    });
    
    // Sort by date and time
    currentShows.sort((a, b) => {
      if (a.date === b.date) {
        return a.time.localeCompare(b.time);
      }
      return a.date.localeCompare(b.date);
    });
    
    // Filter for today initially
    const today = new Date().toISOString().split('T')[0];
    filterShowsByDay(today);
  }
  
  // Filter shows by selected day
  function filterShowsByDay(dateStr) {
    filteredShows = currentShows.filter(show => show.date === dateStr);
    renderShows();
  }
  
  // Render shows list
  function renderShows() {
    const showsList = document.getElementById('showsList');
    const showMoreBtn = document.getElementById('showMoreBtn');
    
    if (!showsList) return;
    
    if (filteredShows.length === 0) {
      showsList.innerHTML = '<div class="no-shows">No shows scheduled for this day</div>';
      showMoreBtn.style.display = 'none';
      return;
    }
    
    showMoreBtn.style.display = 'inline-flex';
    
    const startIndex = 0;
    const endIndex = expanded ? filteredShows.length : Math.min(showsPerPage, filteredShows.length);
    const visibleShows = filteredShows.slice(startIndex, endIndex);
    const hiddenShows = filteredShows.slice(endIndex);
    
    let html = '';
    
    visibleShows.forEach(show => {
      const statusClass = 
        show.status === 'Airing' ? 'status-airing' : 
        show.status === 'Upcoming' ? 'status-upcoming' : 
        'status-ongoing';
      
      html += `
        <a href="${show.link}" class="show-item" target="_blank">
          <span class="show-time">
            <svg viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.5-13v4l5 3-5 3v-4H9v-6h2.5z"/>
            </svg>
            ${show.time}
          </span>
          <span class="show-title">${show.title}</span>
          <span class="show-episode">
            <svg viewBox="0 0 24 24">
              <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h6v2h-6z"/>
            </svg>
            Ep ${show.episode}
          </span>
          <span class="show-status ${statusClass}">${show.status}</span>
        </a>
      `;
    });
    
    if (hiddenShows.length > 0) {
      html += `<div class="hidden-shows ${expanded ? 'expanded' : ''}" id="hiddenShows">`;
      hiddenShows.forEach(show => {
        const statusClass = 
          show.status === 'Airing' ? 'status-airing' : 
          show.status === 'Upcoming' ? 'status-upcoming' : 
          'status-ongoing';
        
        html += `
          <a href="${show.link}" class="show-item" target="_blank">
            <span class="show-time">
              <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.5-13v4l5 3-5 3v-4H9v-6h2.5z"/>
              </svg>
              ${show.time}
            </span>
            <span class="show-title">${show.title}</span>
            <span class="show-episode">
              <svg viewBox="0 0 24 24">
                <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12zM10 9h8v2h-8zm0 3h6v2h-6z"/>
              </svg>
              Ep ${show.episode}
            </span>
            <span class="show-status ${statusClass}">${show.status}</span>
          </a>
        `;
      });
      html += '</div>';
    }
    
    showsList.innerHTML = html;
    
    // Update button text
    const btn = document.getElementById('showMoreBtn');
    if (expanded) {
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" style="transform: rotate(180deg);">
          <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
        </svg>
        Show Less
      `;
      btn.classList.add('expanded');
    } else {
      btn.innerHTML = `
        <svg viewBox="0 0 24 24">
          <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
        </svg>
        Show More (${filteredShows.length - showsPerPage} more)
      `;
      btn.classList.remove('expanded');
    }
  }
  
  // Initialize horizontal scroll with arrows
  function initHorizontalScroll() {
    const scrollContainer = document.getElementById('daysScroll');
    const leftArrow = document.getElementById('leftArrow');
    const rightArrow = document.getElementById('rightArrow');
    
    if (!scrollContainer || !leftArrow || !rightArrow) return;
    
    function updateArrows() {
      const isAtStart = scrollContainer.scrollLeft <= 5;
      const isAtEnd = scrollContainer.scrollLeft + scrollContainer.clientWidth >= scrollContainer.scrollWidth - 5;
      
      leftArrow.classList.toggle('hidden', isAtStart);
      rightArrow.classList.toggle('hidden', isAtEnd);
    }
    
    leftArrow.addEventListener('click', () => {
      scrollContainer.scrollBy({ left: -200, behavior: 'smooth' });
    });
    
    rightArrow.addEventListener('click', () => {
      scrollContainer.scrollBy({ left: 200, behavior: 'smooth' });
    });
    
    scrollContainer.addEventListener('scroll', updateArrows);
    window.addEventListener('resize', updateArrows);
    
    setTimeout(updateArrows, 100);
  }
  
  // Show More/Less button functionality
  document.getElementById('showMoreBtn').addEventListener('click', function() {
    expanded = !expanded;
    renderShows();
  });
  
  // Initialize everything
  function init() {
    initWorldTimer();
    generateDayCards();
    initHorizontalScroll();
    fetchShows();
  }
  
  // Start when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
